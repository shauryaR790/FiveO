    <script type="text/babel">
      const FADE_MS = 500;
      const FADE_OUT_LEAD = 0.55;

      function fadeTo(video, targetOpacity, duration, rafIdRef) {
        if (rafIdRef.current != null) {
          cancelAnimationFrame(rafIdRef.current);
          rafIdRef.current = null;
        }

        let startOpacity = parseFloat(video.style.opacity);
        if (!Number.isFinite(startOpacity)) startOpacity = 0;

        const from = startOpacity;
        const to = targetOpacity;
        const startTime = performance.now();

        function step(now) {
          var elapsed = now - startTime;
          var t = Math.min(1, elapsed / duration);
          video.style.opacity = String(from + (to - from) * t);

          if (t < 1) {
            rafIdRef.current = requestAnimationFrame(step);
          } else {
            rafIdRef.current = null;
          }
        }

        rafIdRef.current = requestAnimationFrame(step);
      }

      function FadingVideo({ src, className, style }) {
        var containerRef = React.useRef(null);
        var fadingOutRef = React.useRef(false);
        var rafCancelRef = React.useRef(null);

        React.useEffect(
          function () {
            var video =
              containerRef.current && containerRef.current.querySelector('video');
            if (!video) return;

            video.style.opacity = '0';
            fadingOutRef.current = false;

            function onLoadedData() {
              fadingOutRef.current = false;
              video.style.opacity = '0';
              video.play().catch(function () {});
              fadeTo(video, 1, FADE_MS, rafCancelRef);
            }

            function onTimeUpdate() {
              if (!video.duration || !Number.isFinite(video.duration)) return;
              var remaining = video.duration - video.currentTime;
              if (
                !fadingOutRef.current &&
                remaining <= FADE_OUT_LEAD &&
                remaining > 0
              ) {
                fadingOutRef.current = true;
                fadeTo(video, 0, FADE_MS, rafCancelRef);
              }
            }

            function onEnded() {
              video.style.opacity = '0';
              setTimeout(function () {
                fadingOutRef.current = false;
                video.currentTime = 0;
                video.play().catch(function () {});
                fadeTo(video, 1, FADE_MS, rafCancelRef);
              }, 100);
            }

            video.addEventListener('loadeddata', onLoadedData);
            video.addEventListener('timeupdate', onTimeUpdate);
            video.addEventListener('ended', onEnded);

            return function cleanup() {
              if (rafCancelRef.current != null) {
                cancelAnimationFrame(rafCancelRef.current);
                rafCancelRef.current = null;
              }
              video.removeEventListener('loadeddata', onLoadedData);
              video.removeEventListener('timeupdate', onTimeUpdate);
              video.removeEventListener('ended', onEnded);
            };
          },
          [src],
        );

        return (
          <div
            ref={containerRef}
            className="absolute inset-0 overflow-hidden pointer-events-none"
          >
            <video
              src={src}
              muted
              autoPlay
              playsInline
              preload="auto"
              className={className}
              style={style || {}}
            />
          </div>
        );
      }

      window.FadingVideo = FadingVideo;

    <script type="text/babel">
      var motion = Motion.motion;

      function BlurText({ text, className }) {
        var rootRef = React.useRef(null);
        var words = React.useMemo(
          function () {
            return text.split(/\s+/).filter(Boolean);
          },
          [text],
        );
        var visibleState = React.useState(false);
        var visible = visibleState[0];
        var setVisible = visibleState[1];

        React.useEffect(
          function () {
            var el = rootRef.current;
            if (!el) return;
            var io = new IntersectionObserver(
              function (entries) {
                entries.forEach(function (e) {
                  if (e.isIntersecting) setVisible(true);
                });
              },
              { threshold: 0.1 },
            );
            io.observe(el);
            return function () {
              io.disconnect();
            };
          },
          [text],
        );

        return (
          <p
            ref={rootRef}
            className={'flex flex-wrap justify-center gap-y-[0.1em] ' + (className || '')}
          >
            {words.map(function (word, idx) {
              return (
                <motion.span
                  key={'w-' + idx + '-' + word}
                  initial={{
                    filter: 'blur(10px)',
                    opacity: 0,
                    y: 50,
                  }}
                  animate={
                    visible
                      ? {
                          filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                          opacity: [0, 0.5, 1],
                          y: [50, -5, 0],
                        }
                      : {
                          filter: 'blur(10px)',
                          opacity: 0,
                          y: 50,
                        }
                  }
                  transition={{
                    duration: 0.7,
                    times: [0, 0.5, 1],
                    ease: 'easeOut',
                    delay: idx * 0.1,
                  }}
                  style={{ display: 'inline-block', marginRight: '0.28em' }}
                >
                  {word}
                </motion.span>
              );
            })}
          </p>
        );
      }

      window.BlurText = BlurText;
    </script>
